<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Sensor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h2>Sensor Dashboard</h2>
        <a href="sensor_data.csv" class="btn" download>Download CSV</a>
        <div class="stats-container">
            <div class="stat-card">
                <h3>Temperature</h3>
                <p>High: <span id="temp-high">--</span>°C</p>
                <p>Low: <span id="temp-low">--</span>°C</p>
                <p>Avg: <span id="temp-avg">--</span>°C</p>
            </div>
            <div class="stat-card">
                <h3>Humidity</h3>
                <p>High: <span id="hum-high">--</span>%</p>
                <p>Low: <span id="hum-low">--</span>%</p>
                <p>Avg: <span id="hum-avg">--</span>%</p>
            </div>
            <div class="stat-card">
                <h3><span class="status-indicator status-offline" id="status-circle"></span>Latest Data</h3>
                <p>Temp: <span id="latest-temp">--</span>°C</p>
                <p>RH: <span id="latest-rh">--</span>%</p>
                <p>Time: <span id="latest-time">--</span></p>
            </div>
        </div>
        <canvas id="tempChart" width="400" height="200"></canvas>
        <canvas id="humChart" width="400" height="200"></canvas>

        <table id="dataTable">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Temp (°C)</th>
                    <th>Humidity (%)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>

</html>
